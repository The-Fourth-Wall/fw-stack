<!doctype html>
<html
  lang="en"
  style="
    color-scheme: dark;
    color: #facfff;
    background-color: color-mix(in srgb, #110019 97%, #f7f7f7);
    background-attachment: fixed;
    font-weight: 400;
    font-feature-settings: &quot;lnum&quot;;
    font-synthesis: none;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-text-size-adjust: 100%;
  ">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Fourth Wall | Maintenance</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet" />
    <style>
      :root {
        --accent-color: #865e98;
      }
      .maintenance-status-card {
        animation: maintenance-status-glow 2.5s ease-in-out infinite;
      }
      @keyframes maintenance-status-glow {
        0%,
        100% {
          box-shadow:
            0 0 0 1px color-mix(in srgb, #facfff 6%, transparent),
            0 24px 48px color-mix(in srgb, #050505 45%, transparent),
            0 4px 16px color-mix(in srgb, var(--accent-color) 25%, transparent),
            0 3px 6px color-mix(in srgb, var(--accent-color) 17.5%, transparent);
        }
        50% {
          box-shadow:
            0 0 0 1px color-mix(in srgb, #facfff 6%, transparent),
            0 24px 48px color-mix(in srgb, #050505 45%, transparent),
            0 6px 24px
              color-mix(in srgb, var(--accent-color) 37.5%, transparent),
            0 5px 9px color-mix(in srgb, var(--accent-color) 26.5%, transparent);
        }
      }
      @keyframes maintenance-cog-glow {
        0%,
        100% {
          filter: drop-shadow(
              0 0 1px color-mix(in srgb, #facfff 45%, transparent)
            )
            drop-shadow(
              0 0 8px color-mix(in srgb, var(--accent-color) 38%, transparent)
            )
            drop-shadow(
              0 0 14px color-mix(in srgb, var(--accent-color) 22%, transparent)
            );
        }
        50% {
          filter: drop-shadow(
              0 0 2px color-mix(in srgb, #facfff 55%, transparent)
            )
            drop-shadow(
              0 0 12px color-mix(in srgb, var(--accent-color) 52%, transparent)
            )
            drop-shadow(
              0 0 22px color-mix(in srgb, var(--accent-color) 34%, transparent)
            );
        }
      }
      .maintenance-wip-spin {
        display: block;
        animation:
          maintenance-spin 3.5s linear infinite,
          maintenance-cog-glow 2.5s ease-in-out infinite;
        transform-box: view-box;
        transform-origin: center;
      }
      @keyframes maintenance-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .maintenance-status-card {
          animation: none;
          box-shadow:
            0 0 0 1px color-mix(in srgb, #facfff 6%, transparent),
            0 24px 48px color-mix(in srgb, #050505 45%, transparent),
            0 4px 16px color-mix(in srgb, var(--accent-color) 25%, transparent),
            0 3px 6px color-mix(in srgb, var(--accent-color) 17.5%, transparent);
        }
        .maintenance-wip-spin {
          animation: none;
          filter: drop-shadow(
              0 0 1px color-mix(in srgb, #facfff 45%, transparent)
            )
            drop-shadow(
              0 0 8px color-mix(in srgb, var(--accent-color) 38%, transparent)
            )
            drop-shadow(
              0 0 14px color-mix(in srgb, var(--accent-color) 22%, transparent)
            );
        }
      }
    </style>
  </head>
  <body
    style="
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: &quot;Space Mono&quot;, ui-monospace, monospace;
      overscroll-behavior-y: none;
    ">
    <header
      style="
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 0.5rem 1rem;
        position: sticky;
        top: 0;
        z-index: 100;
        background: color-mix(in srgb, #110019 55%, transparent);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow:
          0 1px 0 color-mix(in srgb, #865e98 35%, transparent),
          0 8px 32px color-mix(in srgb, #050505 40%, transparent);
      ">
      <div
        style="
          display: flex;
          flex-direction: column;
          width: 6rem;
          border-radius: 0.125rem;
          overflow: hidden;
        ">
        <img
          src="/logo-wide-left.png"
          alt="logo"
          draggable="false"
          style="
            display: block;
            width: 100%;
            height: auto;
            filter: brightness(0.8);
          " />
      </div>
    </header>
    <main
      style="
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(1.5rem, 5vw, 3rem) clamp(1rem, 4vw, 2rem);
      ">
      <div
        class="maintenance-status-card"
        style="
          max-width: 32rem;
          width: 100%;
          padding: clamp(1.75rem, 4vw, 2.5rem) clamp(1.5rem, 4vw, 2.25rem);
          border-radius: 0.375rem;
          background: linear-gradient(
            165deg,
            color-mix(in srgb, #1b0524 92%, transparent) 0%,
            color-mix(in srgb, #110019 88%, transparent) 100%
          );
          border: 1px solid color-mix(in srgb, #865e98 38%, transparent);
        ">
        <div style="margin: 0 0 1rem; color: #d0a5e3" aria-hidden="true">
          <svg
            class="maintenance-wip-spin"
            xmlns="http://www.w3.org/2000/svg"
            width="40"
            height="40"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.25"
            stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M11 10.27 7 3.34" />
            <path d="m11 13.73-4 6.93" />
            <path d="M12 22v-2" />
            <path d="M12 2v2" />
            <path d="M14 12h8" />
            <path d="m17 20.66-1-1.73" />
            <path d="m17 3.34-1 1.73" />
            <path d="M2 12h2" />
            <path d="m20.66 17-1.73-1" />
            <path d="m20.66 7-1.73 1" />
            <path d="m3.34 17 1.73-1" />
            <path d="m3.34 7 1.73 1" />
            <circle cx="12" cy="12" r="2" />
            <circle cx="12" cy="12" r="8" />
          </svg>
        </div>
        <p
          style="
            margin: 0 0 0.625rem;
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #facfff;
          ">
          Status: Maintenance
        </p>
        <p
          style="
            margin: 0;
            font-size: 0.9375rem;
            line-height: 1.65;
            color: color-mix(in srgb, #facfff 78%, #805891);
          ">
          Fourth Wall is temporarily unavailable. Please try again later and
          thank you for your patience.
        </p>
      </div>
    </main>
  </body>
</html>
